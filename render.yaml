# Render Blueprint — backend API for RecruitIQ (no database needed).
# Deploy: Render Dashboard → New → Blueprint → select this repo (or New → Web
# Service → Docker, rootDir backend). State is in-memory and resets on restart.
services:
  - type: web
    name: recruitiq-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    plan: free
    autoDeploy: true
    # Render injects $PORT automatically; the Dockerfile binds it. Do not set PORT.
    envVars:
      - key: GEMINI_API_KEY
        sync: false        # SET THIS SECRET in the dashboard (or leave empty for offline mode)
      - key: DEMO_MODE
        value: "false"     # "true" forces the offline heuristic engine
      # Frontend origin(s) allowed by CORS. Pre-filled with the deployed Vercel app.
      - key: CORS_ORIGINS
        value: https://ai-recruitment-platform-theta.vercel.app
      # Also allow Vercel preview deployments (e.g. *-git-branch.vercel.app).
      - key: CORS_ORIGIN_REGEX
        value: https://.*\.vercel\.app
